<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridgewell Table · Template</title>
<style>
:root{
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  /* Per-module accent — overridden at runtime from TABLE.theme.accent (see boot()) */
  --accent:#4F81BD;
  --accent-hover:#3a6da8;
  --accent-focus:#7ab0e0;
  --accent-soft:rgba(79,129,189,.07);
  --accent-soft2:rgba(79,129,189,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0d1424}
body{font-family:var(--font-sans);display:flex;align-items:flex-start;justify-content:center;min-height:100vh}
#app{width:100%;max-width:920px;min-height:580px;font-family:var(--font-sans);background:#1a2744;box-shadow:0 10px 40px rgba(0,0,0,.5);overflow:hidden;border-radius:4px}
.screen{display:none;width:100%;min-height:580px}
.screen.active{display:flex}

/* AVERY SCREENS */
.avery-screen{flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;text-align:center;background:#1a2744;min-height:580px}
.avery-photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);margin:0 auto 1rem;display:block}
.avery-photo-ph{width:90px;height:90px;border-radius:50%;background:#2d3f6e;border:3px solid var(--accent);margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;color:#a0b4cc;font-size:.7rem;text-align:center}
.avery-label{color:#a0b4cc;font-size:.75rem;letter-spacing:.06em;margin-bottom:.2rem}
.avery-title{color:#fff;font-size:1.15rem;font-weight:600;margin-bottom:.2rem}
.avery-sub{color:#7a90b0;font-size:.8rem;margin-bottom:1.2rem}
.avery-quote{color:#d0dcea;font-size:.9rem;line-height:1.8;max-width:500px;margin:0 auto .9rem;font-style:italic}
.avery-body{color:#b0c4d8;font-size:.83rem;line-height:1.75;max-width:500px;margin:0 auto 1.5rem}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:.65rem 1.8rem;font-size:.9rem;cursor:pointer;font-weight:500;transition:background .15s}
.btn-primary:hover,.btn-primary:focus{background:var(--accent-hover);outline:2px solid var(--accent-focus);outline-offset:2px}

/* AUDIO BAR */
.audio-wrap{display:flex;align-items:center;gap:.6rem;max-width:360px;margin:0 auto 1.1rem}
.audio-play{width:32px;height:32px;border-radius:50%;background:var(--accent);border:2px solid transparent;cursor:pointer;color:#fff;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.audio-play:hover,.audio-play:focus{background:var(--accent-hover);outline:2px solid var(--accent-focus);outline-offset:2px}
.audio-track{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:2px;cursor:pointer;position:relative}
.audio-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width .25s linear}
.audio-time{color:#7a90b0;font-size:.7rem;min-width:34px;text-align:right}
.audio-error{color:#e07a7a;font-size:.72rem;margin-top:.3rem;display:none}
.transcript-btn{background:none;border:1px solid #3a5070;color:#7a90b0;border-radius:6px;padding:.3rem .7rem;font-size:.72rem;cursor:pointer;margin-top:.4rem}
.transcript-btn:hover,.transcript-btn:focus{border-color:var(--accent);color:#a0c0e0;outline:2px solid var(--accent);outline-offset:2px}
.transcript-box{background:#0d1a30;border:1px solid #2d3f6e;border-radius:6px;padding:.75rem 1rem;font-size:.78rem;color:#b0c4d8;line-height:1.65;max-width:500px;margin:.5rem auto 0;text-align:left;display:none}

/* HUB */
.hub-screen{flex-direction:column;align-items:center;justify-content:center;padding:1.8rem 1rem;background:#1a2744;min-height:580px;position:relative}
.hub-title{color:#fff;font-size:1rem;font-weight:600;margin-bottom:.25rem}
.hub-sub{color:#7a90b0;font-size:.78rem;margin-bottom:.9rem;text-align:center}
.prog-wrap{width:100%;max-width:500px;height:5px;background:#2d3f6e;border-radius:3px;margin-bottom:.35rem}
.prog-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}
.prog-label{color:#7a90b0;font-size:.72rem;margin-bottom:1.4rem}
.char-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.7rem;width:100%;max-width:640px}
@media(max-width:600px){.char-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:380px){.char-grid{grid-template-columns:repeat(2,1fr)}}
.char-card{border-radius:10px;padding:.85rem .5rem;text-align:center;cursor:pointer;transition:transform .15s,box-shadow .15s;border:2px solid transparent;position:relative}
.char-card:hover:not(.done),.char-card:focus:not(.done){transform:translateY(-3px);box-shadow:0 4px 12px rgba(0,0,0,.4);outline:none}
.char-card:focus:not(.done){outline:2px solid #fff;outline-offset:2px}
.char-card.done{opacity:.5;cursor:default}
.char-avatar{width:48px;height:48px;border-radius:50%;margin:0 auto .45rem;object-fit:cover;border:2px solid rgba(255,255,255,.25);display:block}
.char-avatar-ph{width:48px;height:48px;border-radius:50%;margin:0 auto .45rem;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-size:.85rem;border:2px solid rgba(255,255,255,.2)}
.char-name{font-size:.74rem;font-weight:600;color:#fff}
.char-role{font-size:.63rem;color:rgba(255,255,255,.5);margin-top:.1rem;line-height:1.3}
.done-badge{position:absolute;top:5px;right:5px;width:16px;height:16px;border-radius:50%;background:var(--accent);color:#fff;font-size:.6rem;display:flex;align-items:center;justify-content:center}
.reset-btn{margin-top:1.5rem;background:none;border:1px solid #3a5070;color:#7a90b0;border-radius:6px;padding:.4rem 1rem;font-size:.75rem;cursor:pointer}
.reset-btn:hover,.reset-btn:focus{border-color:var(--accent);color:#a0c0e0;outline:2px solid var(--accent);outline-offset:2px}
.debrief-btn{position:absolute;right:1.1rem;bottom:1.1rem;background:#2d3f6e;color:#fff;border:1px solid #43578a;border-radius:8px;padding:.5rem 1rem;font-size:.78rem;font-weight:500;cursor:pointer}
.debrief-btn:hover{background:#37487a}

/* SPLIT SCREENS */
.split-screen{flex-direction:row;min-height:580px}
@media(max-width:700px){.split-screen{flex-direction:column}}
.s-left{flex:0 0 48%;position:relative;overflow:hidden;background:#0d1520;min-height:280px}
@media(max-width:700px){.s-left{flex:0 0 220px}}
.s-left-img{width:100%;height:100%;object-fit:cover;display:block}
.s-left-color{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem}
.char-portrait{width:110px;height:110px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.3);margin-bottom:1rem;display:block}
.char-portrait-ph{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:1.4rem;border:3px solid rgba(255,255,255,.3);margin-bottom:1rem}
.char-name-large{color:#fff;font-size:1.1rem;font-weight:600;margin-bottom:.2rem}
.char-role-large{color:rgba(255,255,255,.6);font-size:.78rem}

.bubble{position:absolute;top:.9rem;left:.9rem;right:.9rem;background:rgba(15,25,50,.88);border-left:3px solid var(--accent);color:#d0dcea;border-radius:8px;padding:.6rem .8rem;font-size:.76rem;line-height:1.5;font-style:italic;max-width:240px}
.family-flag{position:absolute;bottom:.8rem;left:.8rem;background:rgba(150,70,10,.9);border-radius:7px;padding:.5rem .7rem;font-size:.71rem;color:#fff;line-height:1.4;max-width:240px}
.family-flag strong{display:block;font-size:.65rem;letter-spacing:.04em;margin-bottom:.12rem;opacity:.85}

.s-right{flex:1;background:#edf0f4;padding:1.2rem 1.1rem;display:flex;flex-direction:column;justify-content:space-between;overflow-y:auto}
.scene-ctx{font-size:.79rem;color:#444;line-height:1.6;margin-bottom:.75rem;padding-bottom:.75rem;border-bottom:1px solid #ced3dc}
.q-label{font-size:.68rem;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:.3rem;text-transform:uppercase}
.q-text{font-size:.86rem;font-weight:600;color:#1a2744;line-height:1.5;margin-bottom:.85rem}
.choices{display:flex;flex-direction:column;gap:.55rem}
.choice-btn{display:flex;align-items:flex-start;gap:.6rem;background:none;border:2px solid transparent;border-radius:6px;cursor:pointer;text-align:left;padding:.35rem .4rem;transition:border-color .15s}
.choice-btn:hover,.choice-btn:focus-visible{border-color:var(--accent);outline:none;background:var(--accent-soft)}
.choice-btn.selected{border-color:var(--accent);background:var(--accent-soft2)}
.cbullet{width:24px;height:24px;min-width:24px;border-radius:50%;background:#9ab0cc;transition:background .15s;margin-top:1px;flex-shrink:0}
.choice-btn:hover .cbullet,.choice-btn:focus-visible .cbullet{background:var(--accent)}
.choice-btn.selected .cbullet{background:var(--accent);box-shadow:inset 0 0 0 3px #fff}
.ctext{font-size:.8rem;color:#222;line-height:1.5}

/* CHAR INTRO SCREEN */
.char-intro-screen{flex-direction:row;min-height:580px}
@media(max-width:700px){.char-intro-screen{flex-direction:column}}
.ci-audio-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(15,25,50,.92);border-top:2px solid;padding:.6rem .9rem;display:flex;align-items:center;gap:.6rem}
.ci-play{width:26px;height:26px;border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:.72rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci-play:hover,.ci-play:focus{opacity:.85;outline:2px solid #fff;outline-offset:2px}
.ci-track{flex:1;height:3px;background:rgba(255,255,255,.2);border-radius:2px;cursor:pointer}
.ci-fill{height:100%;border-radius:2px;width:0%}
.ci-time{color:rgba(255,255,255,.45);font-size:.66rem;min-width:28px}

/* FEEDBACK */
.fb-screen{flex-direction:row;min-height:580px}
@media(max-width:700px){.fb-screen{flex-direction:column}}
.fb-left{flex:0 0 48%;position:relative;overflow:hidden;background:#0d1520;min-height:240px}
@media(max-width:700px){.fb-left{flex:0 0 200px}}
.fb-left-img{width:100%;height:100%;object-fit:cover;display:block}
.fb-left-color{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.consequence-banner{position:absolute;bottom:0;left:0;right:0;background:rgba(120,20,20,.92);padding:.7rem .9rem;font-size:.74rem;color:#fff;line-height:1.5}
.consequence-banner strong{display:block;font-size:.64rem;letter-spacing:.04em;margin-bottom:.12rem}
.avery-interrupt{position:absolute;bottom:0;left:0;right:0;background:rgba(15,25,50,.94);border-top:2px solid var(--accent);padding:.7rem .9rem;font-size:.74rem;color:#d0dcea;line-height:1.5;font-style:italic}
.avery-interrupt strong{display:block;font-size:.64rem;color:var(--accent);letter-spacing:.04em;margin-bottom:.12rem;font-style:normal}
.fb-right{flex:1;background:#edf0f4;padding:1.2rem 1.1rem;display:flex;flex-direction:column;justify-content:space-between;overflow-y:auto}
.fb-chosen{font-size:.8rem;color:#333;font-weight:500;margin-bottom:.6rem;line-height:1.5;padding:.5rem .7rem;background:#dde2eb;border-radius:6px;border-left:3px solid #9ab0cc}
.fb-chosen.correct{background:#e7f2da;border-left:4px solid #2f7d1f;color:#234016}
.fb-chosen.wrong{background:#f7dede;border-left:4px solid #c0392b;color:#5a1f18}
.fb-chosen.wrong::before{content:'\2717  INCORRECT';display:block;font-size:.6rem;font-weight:700;letter-spacing:.06em;color:#c0392b;margin-bottom:.25rem}
.fb-chosen.correct::before{content:'\2713  CORRECT';display:block;font-size:.6rem;font-weight:700;letter-spacing:.06em;color:#2f7d1f;margin-bottom:.25rem}
.fb-lbl{font-size:.68rem;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:.22rem;text-transform:uppercase}
.fb-text{font-size:.8rem;color:#333;line-height:1.6;margin-bottom:.7rem}
.fb-takeaway{font-size:.8rem;font-weight:600;font-style:italic;color:#1D3D0F;line-height:1.6;margin-bottom:.9rem;padding:.5rem .7rem;border-left:3px solid #1D3D0F;background:#eaf3de;border-radius:0 6px 6px 0}
.fb-actions{display:flex;flex-direction:column;gap:.45rem}
.fb-btn{display:flex;align-items:center;gap:.6rem;background:none;border:2px solid transparent;border-radius:6px;cursor:pointer;padding:.25rem .35rem;transition:border-color .15s}
.fb-btn:hover,.fb-btn:focus-visible{border-color:var(--accent);outline:none;background:var(--accent-soft)}
.fbullet{width:24px;height:24px;min-width:24px;border-radius:50%;background:#9ab0cc;transition:background .15s;flex-shrink:0}
.fb-btn:hover .fbullet,.fb-btn:focus-visible .fbullet{background:var(--accent)}
.fb-btn-text{font-size:.8rem;color:#222}

/* LIVE REGION */
#live-region{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}

/* EXIT */
.exit-screen{flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.5rem;text-align:center;background:#1a2744;min-height:580px}
.exit-ring{width:68px;height:68px;border-radius:50%;border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;color:var(--accent);font-size:1.5rem}
</style>
</head>
<body>

<div id="app" role="main">
<div aria-live="polite" aria-atomic="true" id="live-region"></div>

<!-- INTRO (text filled by boot() from TABLE) -->
<div class="screen avery-screen active" id="screen-intro" role="region" aria-label="Course introduction">
  <img class="avery-photo" id="intro-avery-photo" src="assets/avery.png" alt="Dr. Patricia Avery" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
  <div class="avery-photo-ph" style="display:none">DA</div>
  <div class="avery-label" id="intro-avery-label"></div>
  <div class="avery-title" id="intro-title"></div>
  <div class="avery-sub" id="intro-sub"></div>
  <div class="audio-wrap" id="aw-intro">
    <button class="audio-play" id="btn-avery_intro" onclick="toggleAudio('avery_intro')" aria-label="Play Dr. Avery introduction">▶</button>
    <div class="audio-track" role="progressbar" aria-label="Audio progress" onclick="seekAudio(event,'avery_intro')"><div class="audio-fill" id="fill-avery_intro"></div></div>
    <span class="audio-time" id="time-avery_intro" aria-live="off">0:00</span>
  </div>
  <div class="audio-error" id="err-avery_intro">Audio unavailable — read transcript below</div>
  <button class="transcript-btn" onclick="toggleTranscript('tr-intro')" aria-expanded="false" aria-controls="tr-intro">Show transcript</button>
  <div class="transcript-box" id="tr-intro" role="note"></div>
  <div class="avery-quote" id="intro-quote" style="margin-top:.9rem"></div>
  <div class="avery-body" id="intro-body"></div>
  <button class="btn-primary" id="intro-enter" onclick="showHub()" style="margin-top:.5rem">Enter the room →</button>
</div>

<!-- HUB (title/sub + cards filled by boot()) -->
<div class="screen hub-screen" id="screen-hub" role="region" aria-label="Character selection">
  <div class="hub-title" id="hub-title"></div>
  <div class="hub-sub" id="hub-sub"></div>
  <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
  <div class="prog-label" id="prog-label" aria-live="polite">0 of 5 perspectives completed</div>
  <div class="char-grid" id="char-grid" role="list"></div>
  <button class="reset-btn" onclick="confirmReset()" aria-label="Reset simulation and start over">↺ Start over</button>
  <button class="debrief-btn" onclick="show('screen-exit')" aria-label="Skip to Dr. Avery's debrief and finish">Dr. Avery's debrief →</button>
</div>

<!-- CHAR INTRO -->
<div class="screen char-intro-screen" id="screen-char-intro" role="region" aria-label="Character introduction">
  <div class="s-left" id="ci-left">
    <div class="s-left-color" id="ci-color-panel">
      <img class="char-portrait" id="ci-portrait" alt="" onerror="this.style.display='none';document.getElementById('ci-portrait-ph').style.display='flex'">
      <div class="char-portrait-ph" id="ci-portrait-ph" style="display:none"></div>
      <div class="char-name-large" id="ci-name-large"></div>
      <div class="char-role-large" id="ci-role-large"></div>
    </div>
    <div class="ci-audio-bar" id="ci-bar">
      <button class="ci-play" id="ci-play-btn" onclick="toggleAudio('char_intro')" aria-label="Play character introduction audio">▶</button>
      <div class="ci-track" onclick="seekAudio(event,'char_intro')" aria-label="Audio seek bar"><div class="ci-fill" id="fill-char_intro"></div></div>
      <span class="ci-time" id="time-char_intro">0:00</span>
    </div>
  </div>
  <div class="s-right">
    <div>
      <div class="q-label" id="ci-role-label"></div>
      <div class="q-text" id="ci-intro-text" style="font-size:.95rem;line-height:1.75;color:#1a2744;font-weight:400"></div>
      <div class="audio-error" id="err-char_intro" style="color:#c05050;font-size:.74rem;margin-top:.5rem">Audio unavailable</div>
      <button class="transcript-btn" id="ci-transcript-btn" onclick="toggleTranscript('tr-char')" aria-expanded="false" aria-controls="tr-char" style="margin-top:.6rem">Show transcript</button>
      <div class="transcript-box" id="tr-char" role="note" style="margin-top:.5rem"></div>
    </div>
    <div style="margin-top:1.2rem">
      <button class="btn-primary" style="background:#1a2744;font-size:.83rem" onclick="goToQ1()">Begin scenario →</button>
    </div>
  </div>
</div>

<!-- Q1 -->
<div class="screen split-screen" id="screen-q1" role="region" aria-label="Question 1">
  <div class="s-left">
    <img class="s-left-img" id="q1-scene-img" alt="" onerror="this.style.display='none';document.getElementById('q1-color-panel').style.display='flex'">
    <video class="s-left-img" id="q1-scene-vid" style="display:none" muted loop playsinline aria-hidden="true"></video>
    <div class="s-left-color" id="q1-color-panel" style="display:none">
      <img class="char-portrait" id="q1-portrait" alt="">
      <div class="char-name-large" id="q1-char-name"></div>
    </div>
    <div class="bubble" id="q1-bubble"></div>
    <div class="family-flag" id="q1-family" style="display:none"><strong class="family-tag"></strong><span id="q1-family-text"></span></div>
  </div>
  <div class="s-right">
    <div>
      <div class="scene-ctx" id="q1-ctx"></div>
      <div class="q-label">Question 1 of 2</div>
      <div class="q-text" id="q1-text"></div>
      <div class="choices" id="q1-choices" role="group" aria-label="Answer choices"></div>
    </div>
  </div>
</div>

<!-- FB1 -->
<div class="screen fb-screen" id="screen-fb1" role="region" aria-label="Feedback">
  <div class="fb-left">
    <img class="fb-left-img" id="fb1-scene-img" alt="" onerror="this.style.display='none';document.getElementById('fb1-color').style.display='flex'">
    <video class="fb-left-img" id="fb1-scene-vid" style="display:none" muted loop playsinline aria-hidden="true"></video>
    <div class="fb-left-color" id="fb1-color" style="display:none;background:#1a2744">
      <img class="char-portrait" id="fb1-portrait" alt="">
    </div>
    <div class="consequence-banner" id="fb1-consequence" style="display:none" role="alert"><strong class="consequence-tag"></strong><span id="fb1-consequence-text"></span></div>
    <div class="avery-interrupt" id="fb1-avery" style="display:none" role="note"><strong>DR. AVERY</strong><span id="fb1-avery-text"></span></div>
  </div>
  <div class="fb-right">
    <div>
      <div class="fb-chosen" id="fb1-chosen"></div>
      <div class="fb-lbl">Feedback</div>
      <div class="fb-text" id="fb1-text"></div>
      <div class="fb-takeaway" id="fb1-takeaway" style="display:none" role="note"></div>
    </div>
    <div class="fb-actions" id="fb1-actions" role="group" aria-label="Next steps"></div>
  </div>
</div>

<!-- Q2 -->
<div class="screen split-screen" id="screen-q2" role="region" aria-label="Question 2">
  <div class="s-left">
    <img class="s-left-img" id="q2-scene-img" alt="" onerror="this.style.display='none';document.getElementById('q2-color-panel').style.display='flex'">
    <video class="s-left-img" id="q2-scene-vid" style="display:none" muted loop playsinline aria-hidden="true"></video>
    <div class="s-left-color" id="q2-color-panel" style="display:none">
      <img class="char-portrait" id="q2-portrait" alt="">
      <div class="char-name-large" id="q2-char-name"></div>
    </div>
    <div class="bubble" id="q2-bubble"></div>
    <div class="family-flag" id="q2-family" style="display:none"><strong class="family-tag"></strong><span id="q2-family-text"></span></div>
  </div>
  <div class="s-right">
    <div>
      <div class="scene-ctx" id="q2-ctx"></div>
      <div class="q-label">Question 2 of 2</div>
      <div class="q-text" id="q2-text"></div>
      <div class="choices" id="q2-choices" role="group" aria-label="Answer choices"></div>
    </div>
  </div>
</div>

<!-- FB2 -->
<div class="screen fb-screen" id="screen-fb2" role="region" aria-label="Feedback">
  <div class="fb-left">
    <img class="fb-left-img" id="fb2-scene-img" alt="" onerror="this.style.display='none';document.getElementById('fb2-color').style.display='flex'">
    <video class="fb-left-img" id="fb2-scene-vid" style="display:none" muted loop playsinline aria-hidden="true"></video>
    <div class="fb-left-color" id="fb2-color" style="display:none;background:#1a2744">

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Compute accent shades from a single hex so the whole UI re-themes per module.
function applyTheme(hex){
  function h2(x){return parseInt(x,16);}
  const c=hex.replace('#','');
  const r=h2(c.slice(0,2)),g=h2(c.slice(2,4)),b=h2(c.slice(4,6));
  const mix=(t,a)=>[Math.round(r+(t[0]-r)*a),Math.round(g+(t[1]-g)*a),Math.round(b+(t[2]-b)*a)];
  const rs=document.documentElement.style;
  rs.setProperty('--accent',hex);
  rs.setProperty('--accent-hover','rgb('+mix([0,0,0],.2).join(',')+')');
  rs.setProperty('--accent-focus','rgb('+mix([255,255,255],.4).join(',')+')');
  rs.setProperty('--accent-soft','rgba('+r+','+g+','+b+',.07)');
  rs.setProperty('--accent-soft2','rgba('+r+','+g+','+b+',.13)');
}

function getAudio(key){
  if(!audios[key]){
    const url=key==='char_intro'?AUDIO_URLS[currentChar]:AUDIO_URLS[key];
    if(!url)return null;
    const a=new Audio();
    audios[key]=a;
    a.addEventListener('timeupdate',()=>updateAudioProgress(key,a));
    a.addEventListener('ended',()=>{
      const btn=key==='char_intro'?document.getElementById('ci-play-btn'):document.getElementById('btn-'+key);
      if(btn)btn.textContent='▶';
    });
    a.addEventListener('error',()=>showAudioError(key));
    a.src=url;
  }
  return audios[key];
}

function showAudioError(key){
  const errId=key==='char_intro'?'err-char_intro':`err-${key}`;
  const errEl=document.getElementById(errId);
  if(errEl)errEl.style.display='block';
  const btn=key==='char_intro'?document.getElementById('ci-play-btn'):document.getElementById('btn-'+key);
  if(btn){btn.textContent='✕';btn.disabled=true;}
}

function resetPlayButton(key){
  const btn=key==='char_intro'?document.getElementById('ci-play-btn'):document.getElementById('btn-'+key);
  if(btn)btn.textContent='▶';
}

let activeKey=null;

function btnFor(key){
  return key==='char_intro'?document.getElementById('ci-play-btn'):document.getElementById('btn-'+key);
}

function playKey(key){
  stopAllAudio('');
  const a=getAudio(key);if(!a)return;
  activeKey=key;
  a.play().then(()=>{
    if(activeKey!==key){a.pause();return;}
    const b=btnFor(key);if(b)b.textContent='⏸';
  }).catch(()=>{
    if(activeKey===key)resetPlayButton(key);
  });
}

function toggleAudio(key){
  const a=getAudio(key);if(!a)return;
  if(a.paused){
    playKey(key);
  } else {
    a.pause();activeKey=null;
    const b=btnFor(key);if(b)b.textContent='▶';
  }
}

function stopAllAudio(except){
  if(activeKey&&activeKey!==except)activeKey=null;
  Object.keys(audios).forEach(k=>{
    if(k!==except&&audios[k]&&!audios[k].paused){
      audios[k].pause();
      const btn=btnFor(k);
      if(btn)btn.textContent='▶';
    }
  });
}

function updateAudioProgress(key,a){
  if(!a.duration)return;
  const pct=a.currentTime/a.duration*100;
  const fillId=key==='char_intro'?'fill-char_intro':'fill-'+key;
  const timeId=key==='char_intro'?'time-char_intro':'time-'+key;
  const fill=document.getElementById(fillId);
  const time=document.getElementById(timeId);
  if(fill)fill.style.width=pct+'%';
  if(time){const m=Math.floor(a.currentTime/60),s=Math.floor(a.currentTime%60).toString().padStart(2,'0');time.textContent=m+':'+s;}
}

function seekAudio(e,key){
  const a=getAudio(key);if(!a||!a.duration)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  a.currentTime=Math.max(0,Math.min(1,pct))*a.duration;
}

function toggleTranscript(id){
  const el=document.getElementById(id);
  const btn=document.querySelector(`[aria-controls="${id}"]`);
  if(!el)return;
  const open=el.style.display==='block';
  el.style.display=open?'none':'block';
  if(btn){btn.textContent=open?'Show transcript':'Hide transcript';btn.setAttribute('aria-expanded',!open);}
}

function announce(msg){
  const r=document.getElementById('live-region');
  if(r){r.textContent='';setTimeout(()=>r.textContent=msg,50);}
}

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  if(el){el.classList.add('active');const first=el.querySelector('button,[tabindex="0"]');if(first)setTimeout(()=>first.focus(),100);}
}

function showHub(){

}

function updateHub(){
  const done=Object.keys(completed).length;
  document.getElementById('prog').style.width=(done/TOTAL*100)+'%';
  document.getElementById('prog-label').textContent=done+' of '+TOTAL+' perspectives completed';
  TEAM_KEYS.forEach(c=>{
    const card=document.getElementById('card-'+c);
    if(!card)return;
    if(completed[c]){
      card.classList.add('done');
      card.setAttribute('tabindex','-1');
      card.setAttribute('aria-disabled','true');
      if(!card.querySelector('.done-badge')){const b=document.createElement('div');b.className='done-badge';b.textContent='✓';b.setAttribute('aria-hidden','true');card.appendChild(b);}
    }
  });
}

function confirmReset(){ resetSim(); }

function resetSim(){
  completed={};q1Wrong=0;q2Wrong=0;activeKey=null;
  Object.keys(audios).forEach(k=>{audios[k].pause();audios[k].currentTime=0;const b=btnFor(k);if(b)b.textContent='▶';});
  TEAM_KEYS.forEach(c=>{
    const card=document.getElementById('card-'+c);
    if(card){card.classList.remove('done');card.setAttribute('tabindex','0');card.removeAttribute('aria-disabled');const b=card.querySelector('.done-badge');if(b)b.remove();}
  });
  document.getElementById('prog').style.width='0%';
  document.getElementById('prog-label').textContent='0 of '+TOTAL+' perspectives completed';
  show('screen-intro');
  announce('Simulation reset. Starting over.');
}

function playSceneVideo(vidEl,imgEl,src){
  if(!vidEl)return;
  vidEl.muted=true;vidEl.loop=true;vidEl.playsInline=true;
  const fail=()=>{vidEl.style.display='none';if(imgEl){imgEl.src=SCENE_IMG;imgEl.style.display='block';}};
  vidEl.onerror=fail;
  vidEl.style.display='block';
  const go=()=>vidEl.play().catch(()=>{});
  if(SCENE_BLOB[src]){vidEl.src=SCENE_BLOB[src];vidEl.dataset.loadedSrc=src;go();return;}
  fetch(src).then(r=>{if(!r.ok)throw 0;return r.blob();}).then(b=>{
    if(!SCENE_BLOB[src])SCENE_BLOB[src]=URL.createObjectURL(b);
    vidEl.src=SCENE_BLOB[src];vidEl.dataset.loadedSrc=src;go();
  }).catch(fail);
}

function setSceneImg(qNum,name,isColor){

  const nameEl=document.getElementById(`q${qNum}-char-name`);
  const d=CHARS[name];
  const sc=isColor?{}:sceneFor(name,qNum);
  const hasVid=!!sc.video;
  const hasImg=!!sc.img;
  if(hasVid){
    playSceneVideo(vidEl,sceneEl,sc.video);
    sceneEl.style.display='none';
    if(colorEl)colorEl.style.display='none';
  } else if(hasImg){
    sceneEl.src=sc.img;sceneEl.style.display='block';sceneEl.style.objectPosition=sc.pos||'center';
    if(vidEl){vidEl.pause();vidEl.style.display='none';}
    if(colorEl)colorEl.style.display='none';
  } else {
    sceneEl.style.display='none';
    if(vidEl){vidEl.pause();vidEl.style.display='none';}
    if(colorEl){colorEl.style.display='flex';colorEl.style.background=d.bgDark;}
    if(portEl){portEl.src=PORTRAITS[name];portEl.alt=name;}
    if(nameEl)nameEl.textContent=byKey[name].name;
  }
  const fbSceneEl=document.getElementById(`fb${qNum}-scene-img`);
  const fbVidEl=document.getElementById(`fb${qNum}-scene-vid`);
  const fbColorEl=document.getElementById(`fb${qNum}-color`);
  const fbPortEl=document.getElementById(`fb${qNum}-portrait`);
  if(hasVid){
    playSceneVideo(fbVidEl,fbSceneEl,sc.video);
    if(fbSceneEl)fbSceneEl.style.display='none';
    if(fbColorEl)fbColorEl.style.display='none';
  } else if(hasImg){
    if(fbSceneEl){fbSceneEl.src=sc.img;fbSceneEl.style.display='block';fbSceneEl.style.objectPosition=sc.pos||'center';}
    if(fbVidEl){fbVidEl.pause();fbVidEl.style.display='none';}
    if(fbColorEl)fbColorEl.style.display='none';
  } else {
    if(fbSceneEl)fbSceneEl.style.display='none';
    if(fbVidEl){fbVidEl.pause();fbVidEl.style.display='none';}
    if(fbColorEl){fbColorEl.style.display='flex';fbColorEl.style.background=d.bgDark;}
    if(fbPortEl){fbPortEl.src=PORTRAITS[name];fbPortEl.alt=name;}
  }
}

function renderQ1(){
  const d=CHARS[currentChar].q1;
  setSceneImg(1,currentChar,false);
  document.getElementById('q1-bubble').textContent=d.bubble;
  document.getElementById('q1-ctx').textContent=d.ctx;
  document.getElementById('q1-text').textContent=d.q;
  const fam=document.getElementById('q1-family');
  if(d.family){fam.style.display='block';document.getElementById('q1-family-text').textContent=d.familyText;}
  else fam.style.display='none';
  renderChoices('q1-choices',d.choices,handleQ1);
}

function renderQ2(){
  const d=CHARS[currentChar].q2;
  setSceneImg(2,currentChar,false);
  document.getElementById('q2-bubble').textContent=d.bubble;
  document.getElementById('q2-ctx').textContent=d.ctx;
  document.getElementById('q2-text').textContent=d.q;
  const fam=document.getElementById('q2-family');
  if(d.family){fam.style.display='block';document.getElementById('q2-family-text').textContent=d.familyText;}
  else fam.style.display='none';
  renderChoices('q2-choices',d.choices,handleQ2);
}

function renderChoices(id,choices,handler){
  const el=document.getElementById(id);el.innerHTML='';
  const shuffled=choices.slice();
  for(let i=shuffled.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];}
  shuffled.forEach((ch,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.setAttribute('aria-label','Option '+(i+1)+': '+ch.text);
    btn.innerHTML='<div class="cbullet" aria-hidden="true"></div><span class="ctext">'+esc(ch.text)+'</span>';
    btn.onclick=()=>{
      [...el.querySelectorAll('.choice-btn')].forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      setTimeout(()=>handler(ch),220);
    };
    el.appendChild(btn);
  });
}

function handleQ1(ch){
  const chosen=document.getElementById('fb1-chosen');
  chosen.textContent=ch.text;
  chosen.classList.toggle('correct',!!ch.correct);
  chosen.classList.toggle('wrong',!ch.correct);
  document.getElementById('fb1-text').textContent=ch.feedback;
  const conseq=document.getElementById('fb1-consequence');
  const averyEl=document.getElementById('fb1-avery');
  const takeEl=document.getElementById('fb1-takeaway');
  const actions=document.getElementById('fb1-actions');
  conseq.style.display='none';averyEl.style.display='none';takeEl.style.display='none';actions.innerHTML='';
  if(ch.correct){
    takeEl.textContent=ch.takeaway||'';takeEl.style.display='block';
    addBtn(actions,'Continue to Question 2 →',()=>{renderQ2();show('screen-q2');announce('Question 2 of 2');});
    addBtn(actions,'Return to team hub',showHub);
    announce('Correct. '+ch.feedback);
  } else {
    q1Wrong++;
    if(ch.consequence){conseq.style.display='block';document.getElementById('fb1-consequence-text').textContent=ch.consequence;}
    if(q1Wrong>=2&&ch.avery){averyEl.style.display='block';document.getElementById('fb1-avery-text').textContent=ch.avery;}
    addBtn(actions,'Try again',()=>{renderQ1();show('screen-q1');});
    addBtn(actions,'Skip to Question 2',()=>{renderQ2();show('screen-q2');announce('Question 2 of 2');});
    addBtn(actions,'Return to team hub',showHub);
    announce('Not quite. '+ch.feedback);
  }
  show('screen-fb1');
}

function handleQ2(ch){
  const chosen=document.getElementById('fb2-chosen');
  chosen.textContent=ch.text;
  chosen.classList.toggle('correct',!!ch.correct);
  chosen.classList.toggle('wrong',!ch.correct);
  document.getElementById('fb2-text').textContent=ch.feedback;
  const conseq=document.getElementById('fb2-consequence');
  const averyEl=document.getElementById('fb2-avery');
  const takeEl=document.getElementById('fb2-takeaway');
  const actions=document.getElementById('fb2-actions');
  conseq.style.display='none';averyEl.style.display='none';takeEl.style.display='none';actions.innerHTML='';
  if(ch.correct){
    takeEl.textContent=ch.takeaway||'';takeEl.style.display='block';
    completed[currentChar]=true;updateHub();
    addBtn(actions,'Return to team hub',showHub);
    announce('Correct. '+ch.feedback+' Perspective complete.');
  } else {
    q2Wrong++;
    if(ch.consequence){conseq.style.display='block';document.getElementById('fb2-consequence-text').textContent=ch.consequence;}
    if(q2Wrong>=2&&ch.avery){averyEl.style.display='block';document.getElementById('fb2-avery-text').textContent=ch.avery;}
    addBtn(actions,'Try again',()=>{renderQ2();show('screen-q2');});
    addBtn(actions,'Return to team hub',showHub);
    announce('Not quite. '+ch.feedback);
  }
  show('screen-fb2');
}

function addBtn(container,label,fn){
  const btn=document.createElement('button');
  btn.className='fb-btn';
  btn.innerHTML='<div class="fbullet" aria-hidden="true"></div><span class="fb-btn-text">'+esc(label)+'</span>';
  btn.onclick=fn;container.appendChild(btn);
}

boot();   // populate screens from TABLE
// No autoplay on load: narration starts only when the learner presses play.
</script>
